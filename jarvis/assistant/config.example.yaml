# ═══════════════════════════════════════════════════════════════
# Assistant Configuration
# ═══════════════════════════════════════════════════════════════
# This is the ONLY place where specific choices are made.
# Changing the assistant name, model, music platform, etc.
# requires editing ONLY this file. No code changes needed.
# ═══════════════════════════════════════════════════════════════

# --- Identity ---
# Change these to rename/rebrand the assistant.
# Every module reads from here — no "Jarvis" hardcoded anywhere.
assistant:
  name: "Jarvis"
  wake_word: "jarvis"
  personality: >
    You are a smart, friendly voice assistant. You speak concisely
    and have a warm personality. You understand Hindi, English,
    and Hinglish naturally.

# --- Brain (LLM) ---
# Which model + backend to use for understanding commands.
# Swap model: change the name. Swap backend: change the provider.
brain:
  provider: "ollama" # options: ollama, llamacpp, openai, custom
  model: "llama3.2:3b" # any model tag your provider supports
  endpoint: "http://localhost:11434" # where the model server runs
  temperature: 0.3 # lower = more consistent intent parsing
  json_mode: true # constrain output to valid JSON

  # Song resolution: when the user describes a song vaguely,
  # the LLM produces search keywords. It does NOT need to know
  # the actual song — the music provider's search handles that.
  song_resolution_strategy: "search" # options: search (pass to music provider), llm_only (ask LLM to name the song)

# --- Ears (Speech-to-Text) ---
# How spoken words become text.
ears:
  provider: "faster_whisper" # options: faster_whisper, whisper_cpp, google_cloud, azure, custom
  model_size: "medium" # tiny, base, small, medium, large-v3 (medium recommended for Hindi)
  language: "auto" # auto-detect, or force: "en", "hi"
  device: "auto" # auto (picks GPU if available), cpu, cuda, metal
  # initial_prompt: Biases Whisper's decoder toward expected vocabulary.
  # Default includes Hindi/Hinglish phrases. Override to add domain-specific terms.
  # Set to "" to disable.

# --- Voice (Text-to-Speech) ---
# How text becomes spoken audio.
# Each personality picks its own provider via voice_provider in the personality config.
# The VoiceRouter handles fallback: preferred → fallback_provider → text-only.
#
# Provider hierarchy (best → fastest):
#   kokoro  — 82M params, Hindi support, 48 preset voices, fast on GPU & CPU
#   xtts    — voice cloning from reference WAV, needs 1.5-2GB VRAM
#   edge    — cloud-based (Microsoft), zero local resources, needs internet
#   piper   — ultra-fast CPU-only, but English-only and robotic
voice:
  enabled: true # master switch — set to false to disable all TTS
  fallback_provider: "kokoro" # best quality fallback (change to "piper" for speed)
  model: "en_US-lessac-medium" # Piper default model (used when falling back to piper)
  speed: 1.0
  output_device: "default" # "default", "bluetooth", or specific device name

# --- Hands (Skills/Actions) ---
# What the assistant can actually DO.
music:
  provider: "youtube_music" # options: youtube_music, spotify, apple_music, custom
  search_results: 5 # how many results to consider
  auto_play_first: true # play first result automatically, or ask user?
  player: "mpv" # audio player backend: mpv, vlc, custom

  # User's music taste — fed to the LLM so it can disambiguate vague requests.
  # "Sajni" alone could be 10 songs. But "Sajni" + knowing the user loves Arijit Singh
  # → "Sajni Arijit Singh Laapata Ladies". This is how we beat Alexa.
  user_preferences:
    languages: ["Hindi", "English"] # user listens to both
    region: "India"
    favorite_artists:
      # Hindi / Bollywood
      - "Arijit Singh"
      - "Shreya Ghoshal"
      - "A.R. Rahman"
      - "Pritam"
      # English / Western
      - "Coldplay"
      - "Ed Sheeran"
      - "The Weeknd"
    favorite_genres:
      - "Bollywood"
      - "Hindi romantic"
      - "Sufi"
      - "Pop"
      - "Alternative rock"
    # When a song name is ambiguous AND the language is Hindi,
    # prefer recent Bollywood hit by a favorite artist.
    # When the song is clearly English, prefer the globally popular version.
    disambiguation_bias: "recent_bollywood" # applies to Hindi songs only

# --- Knowledge (Web Search / RAG) ---
# Gives the assistant access to current information beyond the LLM's training data.
# This is the "internet-enhanced" layer: local-first, but smarter when online.
#
# Philosophy: The core assistant (music, lights, chat, TTS, wake word) works
# entirely offline. Knowledge is an OPTIONAL upgrade that activates when
# internet is available — like how Alexa degrades without WiFi, except
# our core features don't degrade at all.
#
# How it works (lightweight RAG):
#   1. The classifier detects a "knowledge_search" intent (news, facts, current events)
#   2. KnowledgeProvider searches the web and returns short snippets
#   3. Snippets are injected into the LLM prompt as context
#   4. The LLM generates a grounded, conversational answer
#
# On edge hardware (Jetson 8GB): keep max_results LOW. Each result adds ~100-150
# tokens to the prompt. The model's KV cache (working memory) grows linearly with
# input length, eating into shared GPU RAM. 3 results ≈ 400 tokens — safe.
knowledge:
  enabled: true                    # master switch — false disables all web search
  provider: "duckduckgo"           # options: duckduckgo (no API key), searxng, tavily, brave
  max_results: 3                   # keep low for edge hardware context windows
  region: "in-en"                  # DuckDuckGo region (India-English)
  safesearch: "moderate"           # off, moderate, strict
  timeout: 5                       # seconds before giving up on a search
  # Future options:
  # api_key: ""                    # needed for tavily, brave, google_custom
  # searxng_url: "http://localhost:8888"  # for self-hosted SearXNG
  # cache_ttl: 300                 # seconds to cache results (for RSS/news feeds)
  # max_snippet_length: 200        # truncate snippets to save context window

# --- Audio Output ---
# System-level audio routing. Volume lives here, not in music,
# because "volume down" applies to everything: music, voice responses, alerts.
# When you add a Bluetooth speaker or move to a Jetson with HDMI + BT,
# configure outputs here. All providers route audio through this.
audio:
  provider: "system" # options: system (OS-level), pulseaudio, pipewire, custom
  default_output: "default" # which output to use by default
  outputs:
    - name: "default"
      type: "system" # uses OS default audio device
    # Uncomment when you connect the Bluetooth speaker:
    # - name: "jbl_speaker"
    #   type: "bluetooth"
    #   mac_address: "XX:XX:XX:XX:XX:XX"
    # - name: "room_speaker"
    #   type: "hdmi"

lights:
  provider: "tuya" # options: tuya, hue, wiz, mqtt, custom
  devices:
    - name: "room_light"
      device_id: "YOUR_DEVICE_ID"
      local_key: "YOUR_LOCAL_KEY"
      ip: "192.168.1.X"
      type: "rgb" # rgb (full colour + white modes)
      version: 3.5 # Tuya protocol version (auto-detected)
  scenes:
    romantic: { color: "#FF1450", brightness: 30 }
    movie: { color: "#1a1a3c", brightness: 10 }
    study: { color: "#FFFFFF", brightness: 100 }
    party: { color: "#FF00FF", brightness: 80 }
    sleep: { color: "#FF8C00", brightness: 5 }
    reading: { color: "#FFFFFF", brightness: 70 }
    sunset: { color: "#FF6B35", brightness: 50 }
    focus: { color: "#4169E1", brightness: 60 }

# --- Body (Hardware) ---
# Physical device configuration. Ignored when running on Mac (simulation mode).
hardware:
  platform: "auto" # auto-detect, or force: mac, jetson, rpi, x86_linux
  mic:
    type: "default" # default (system mic), respeaker, inmp441, usb
    sample_rate: 16000
    channels: 1
  speaker:
    type: "default" # default, bluetooth, usb, hdmi
    bluetooth_device: null # MAC address if using bluetooth
  leds:
    enabled: false # NeoPixel/WS2812B LED ring
    pin: null # GPIO pin number
    count: 0 # number of LEDs

# --- Wake Word ---
# Detects spoken activation phrases using a small neural model (~1-2MB).
# Runs in a background thread, continuously processing 80ms audio chunks.
# Each personality can have its own wake word — saying that phrase both
# activates the assistant AND switches to that personality.
wake_word:
  provider: "openwakeword" # options: openwakeword, porcupine, snowboy, custom
  sensitivity: 0.5 # 0.0 (never triggers) to 1.0 (triggers on everything)
  cooldown: 2.0 # seconds between detections (prevents rapid re-triggering)
  custom_models: [] # paths to custom-trained .onnx/.tflite models
  # Note: The system wake word comes from assistant.wake_word above.
  # Per-personality wake words are set in each personality's profile below.

# --- Personalities ---
# Multiple personalities the assistant can switch between.
# Each personality changes tone, voice, and optionally music taste.
# Switch via voice: "switch to Devesh mode", "talk like Chandler"
# Future: auto-switch via speaker recognition (voice ID)
personalities:
  default: "jarvis" # which personality to start with

  profiles:
    jarvis:
      display_name: "Jarvis"
      description: "Default — helpful, concise, warm"
      wake_word: "hey jarvis" # pre-trained model ships with openwakeword
      tone: >
        You speak concisely and warmly. You're efficient but friendly.
        You understand Hindi, English, and Hinglish naturally.
        You keep responses short — this is a voice assistant, not a chatbot.
      voice_provider: "kokoro" # 82M params, natural sounding, Hindi support
      voice_model: "af_heart" # Kokoro preset: American Female (warm tone)

    devesh:
      display_name: "Devesh"
      description: "Devesh's personality — for his girlfriend to talk to"
      wake_word: "hey devesh" # needs custom-trained model (see 02-the-ears/README.md)
      tone: >
        You ARE Devesh — not an assistant pretending to be him, but actually him.
        You speak casually in Hinglish (mix of Hindi and English).
        You say "yaar" and "bro" naturally. You're a bit nerdy, love tech and coding.
        You have a dry sense of humor. You love food — especially biryani and momos.
        Keep it natural and casual, like texting a close friend.
        IMPORTANT: Stay in character. Never break character or say "as an AI".
      voice_provider: "xtts" # voice cloning
      voice_model: "devesh" # XTTS ref WAV: voices/xtts/devesh.wav
      fallback_voice: "hm_omega" # Kokoro Hindi Male — used when XTTS unavailable
      music_preferences:
        favorite_artists:
          - "Arijit Singh"
          - "Coldplay"
          - "The Weeknd"
          - "Pritam"
          - "A.R. Rahman"

    # TODO: Fill in your girlfriend's personality details
    girlfriend:
      display_name: "Girlfriend" # change to her name
      description: "Girlfriend's personality — for Devesh to talk to"
      tone: >
        You ARE [name] — not an assistant, but actually her.
        [Add her mannerisms, speech patterns, pet phrases, personality traits here]
        Keep it natural and loving.
        IMPORTANT: Stay in character. Never break character or say "as an AI".
      voice_provider: "kokoro" # natural sounding (or "xtts" with her WAV later)
      voice_model: "af_bella" # Kokoro preset: American Female (soft tone)
      music_preferences:
        favorite_artists: [] # fill in her favorites

    chandler:
      display_name: "Chandler"
      description: "The sarcastic one — could this BE any more helpful?"
      wake_word: "hey chandler" # needs custom-trained model
      tone: >
        You're Chandler Bing. EVERYTHING gets a sarcastic spin.
        You use "Could this BE any more..." and similar patterns.
        You make self-deprecating jokes. You're awkward but lovable.
        Despite the sarcasm, you actually help — you just can't resist
        making it funny. You still understand Hindi/Hinglish commands perfectly.
        Keep responses SHORT — one-liner sarcasm, not paragraphs.
      voice_provider: "xtts" # voice cloning
      voice_model: "chandler" # XTTS ref WAV: voices/xtts/chandler.wav
      fallback_voice: "am_adam" # Kokoro American Male — used when XTTS unavailable

# --- Memory ---
# Persistent memory: logs every interaction so Jarvis can recall what happened.
# "What did I play yesterday?" "When was the last time I asked about lights?"
memory:
  enabled: true # master switch — false disables all logging
  provider: "sqlite" # options: sqlite (local, zero deps). Future: postgres, chromadb
  db_path: "data/memory.db" # relative to assistant/ dir. Gitignored via data/
  fact_extraction: "silent" # "silent" = store facts without asking. "confirm" = ask user first.
  # v1: keyword search only. v2+ will add these:
  # embedding_model: "all-MiniLM-L6-v2"  # 22MB, runs on CPU
  # max_context_memories: 5               # how many memories to inject into LLM context

# --- UI (Face Display) ---
# Browser-based animated face that shows assistant state.
# Opens in a browser on the Jetson's display (or any connected screen).
# Communicates with the assistant via WebSocket — purely cosmetic.
ui:
  enabled: true
  port: 8765 # WebSocket port for face.html to connect to
  # Open ui/face.html in a browser, or navigate to http://localhost:8765
  # The face auto-connects and shows: idle, listening, thinking, speaking states
  # Each personality has its own face style, colors, and animations

# --- Logging & Debug ---
debug:
  log_level: "DEBUG" # DEBUG, INFO, WARNING, ERROR
  log_intents: true # log every classified intent
  log_latency: true # log response times
  save_audio: false # save recorded audio clips for debugging
