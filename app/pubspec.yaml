name: jarvis_companion
description: Companion app for the JARVIS voice assistant
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Networking
  dio: ^5.4.3                      # HTTP client for REST
  web_socket_channel: ^3.0.1       # WebSocket client

  # Routing
  go_router: ^14.2.0

  # Storage
  shared_preferences: ^2.2.3       # Persist connection info + token

  # Service discovery
  nsd: ^3.0.0                      # mDNS / Bonjour / Zeroconf

  # UI
  cupertino_icons: ^1.0.6
  flutter_colorpicker: ^1.1.0      # Color picker for lights

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  riverpod_generator: ^2.4.0
  build_runner: ^2.4.11

flutter:
  uses-material-design: true
